<div class="auth-page">
  <div class="auth-page__orb auth-page__orb--left"></div>
  <div class="auth-page__orb auth-page__orb--right"></div>

  <section class="auth-card" aria-labelledby="forgot-title">
    <div class="auth-card__badge" aria-hidden="true">
      <img
        class="auth-card__badge-logo"
        src="/logos/475423667_1092274072699371_3696065154213442200_n-removebg-preview.png"
        alt="Logo ENICarthage"
      />
    </div>

    <div class="auth-card__heading">
      <h1 id="forgot-title" class="auth-card__title">Mot de passe oublié</h1>
      <p class="auth-card__subtitle">Entrez votre adresse email pour recevoir un lien de réinitialisation</p>
    </div>

    <div class="auth-card__brand-row" aria-label="Branding ENICarthage">
      <img
        class="auth-card__brand-logo"
        src="/logos/482089456_1117996793460432_4689510947938230990_n-removebg-preview.png"
        alt="Logo secondaire ENICarthage"
      />
      <span>Un accès sécurisé, simple et cohérent avec votre identité ENICarthage.</span>
    </div>

    @if (errorMessage) {
      <div class="auth-card__alert" role="alert">
        {{ errorMessage }}
      </div>
    }

    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <label class="auth-field">
        <span class="auth-field__label">Adresse Email</span>
        <span class="auth-field__control">
          <span class="auth-field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" [attr.stroke]="'currentColor'" [attr.stroke-width]="'1.8'" [attr.stroke-linecap]="'round'" [attr.stroke-linejoin]="'round'">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <path d="m3 7 9 6 9-6" />
            </svg>
          </span>
          <input
            type="email"
            formControlName="email"
            placeholder="exemple@enicarthage.tn"
            autocomplete="email"
            inputmode="email"
          />
        </span>
        @if ((submitted || form.controls.email.touched) && form.controls.email.errors?.['required']) {
          <span class="auth-field__error">L’adresse email est requise.</span>
        }
        @if ((submitted || form.controls.email.touched) && form.controls.email.errors?.['email']) {
          <span class="auth-field__error">Veuillez saisir une adresse email valide.</span>
        }
      </label>

      <button type="submit" class="auth-form__submit" [disabled]="isSubmitting">
        @if (!isSubmitting) {
          <span>Envoyer le lien</span>
        } @else {
          <span>Envoi...</span>
        }
      </button>
    </form>

    <div class="auth-card__divider"></div>

    <p class="auth-card__link-row">
      Retour à la page de connexion ?
      <button type="button" class="auth-card__link-button" (click)="navigateToLogin()">Se connecter</button>
    </p>
  </section>
</div>
