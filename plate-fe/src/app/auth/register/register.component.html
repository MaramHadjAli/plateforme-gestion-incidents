<div class="login-page">
  <div class="login-page__orb login-page__orb--left"></div>
  <div class="login-page__orb login-page__orb--right"></div>

  <section class="login-card" aria-labelledby="register-title">
    <div class="login-card__badge" aria-hidden="true">
      <img
        class="login-card__badge-logo"
        src="/logos/475423667_1092274072699371_3696065154213442200_n-removebg-preview.png"
        alt="Logo ENICarthage"
      />
    </div>

    <div class="login-card__heading">
      <h1 id="register-title" class="login-card__title">Créer un compte</h1>
      <p class="login-card__subtitle">Rejoignez la plateforme de gestion des incidents</p>
    </div>

    <div class="login-card__brand-row" aria-label="Branding ENICarthage">
      <img
        class="login-card__brand-logo"
        src="/logos/482089456_1117996793460432_4689510947938230990_n-removebg-preview.png"
        alt="Logo secondaire ENICarthage"
      />
      <span>Une expérience claire, fiable et moderne.</span>
    </div>

    <div *ngIf="errorMessage" class="login-card__alert" role="alert">
      {{ errorMessage }}
    </div>

    <form class="login-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
      
      <!-- Nom & Prénom Row -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <label class="login-field">
          <span class="login-field__label">Nom <span style="color: red;">*</span></span>
          <span class="login-field__control">
            <span class="login-field__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
            <input type="text" formControlName="nom" placeholder="Nom" autocomplete="family-name" />
          </span>
          <span *ngIf="(submitted || registerForm.controls.nom.touched) && registerForm.controls.nom.errors?.['required']" class="login-field__error">Requis.</span>
        </label>

        <label class="login-field">
          <span class="login-field__label">Prénom <span style="color: red;">*</span></span>
          <span class="login-field__control">
            <span class="login-field__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
            <input type="text" formControlName="prenom" placeholder="Prénom" autocomplete="given-name" />
          </span>
          <span *ngIf="(submitted || registerForm.controls.prenom.touched) && registerForm.controls.prenom.errors?.['required']" class="login-field__error">Requis.</span>
        </label>
      </div>

      <label class="login-field">
        <span class="login-field__label">Adresse Email <span style="color: red;">*</span></span>
        <span class="login-field__control">
          <span class="login-field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <path d="m3 7 9 6 9-6" />
            </svg>
          </span>
          <input type="email" formControlName="email" placeholder="exemple@enicarthage.tn" autocomplete="email" inputmode="email" />
        </span>
        <span *ngIf="(submitted || registerForm.controls.email.touched) && registerForm.controls.email.errors?.['required']" class="login-field__error">L’adresse email est requise.</span>
        <span *ngIf="(submitted || registerForm.controls.email.touched) && registerForm.controls.email.errors?.['email']" class="login-field__error">Email invalide.</span>
      </label>

      <label class="login-field">
        <span class="login-field__label">Mot de passe <span style="color: red;">*</span></span>
        <span class="login-field__control">
          <span class="login-field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="11" width="16" height="10" rx="2" />
              <path d="M7 11V8a5 5 0 0 1 10 0v3" />
            </svg>
          </span>
          <input [type]="isPasswordVisible ? 'text' : 'password'" formControlName="password" placeholder="••••••••" autocomplete="new-password" />
          <button type="button" class="login-field__toggle" (click)="isPasswordVisible = !isPasswordVisible" [attr.aria-label]="isPasswordVisible ? 'Masquer' : 'Afficher'">
            <svg *ngIf="!isPasswordVisible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="isPasswordVisible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3l18 18" />
              <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-1.2" />
              <path d="M6.5 6.5C4 8.3 2 12 2 12s3.5 6 10 6c1.7 0 3.2-.3 4.6-.8" />
              <path d="M14.9 5.2C14 5.1 13 5 12 5 5.5 5 2 12 2 12c.8 1.5 2 3.2 3.7 4.7" />
            </svg>
          </button>
        </span>
        <span *ngIf="(submitted || registerForm.controls.password.touched) && registerForm.controls.password.errors?.['minlength']" class="login-field__error">Min. 6 caractères.</span>
      </label>

      <label class="login-field">
        <span class="login-field__label">Téléphone</span>
        <span class="login-field__control">
          <span class="login-field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
            </svg>
          </span>
          <input type="tel" formControlName="telephone" placeholder="Numéro de téléphone" autocomplete="tel" />
        </span>
      </label>

      <button type="submit" class="login-form__submit" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Créer un compte</span>
        <span *ngIf="isSubmitting">Création...</span>
      </button>
    </form>

    <p class="login-card__link-row">
      Vous avez déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>
  </section>
</div>
