<div class="login-page">
  <div class="login-page__orb login-page__orb--left"></div>
  <div class="login-page__orb login-page__orb--right"></div>

  <section class="login-card" aria-labelledby="login-title">
    <div class="login-card__badge" aria-hidden="true">
      <img
        class="login-card__badge-logo"
        src="/logos/475423667_1092274072699371_3696065154213442200_n-removebg-preview.png"
        alt="Logo ENICarthage"
      />
    </div>

    <div class="login-card__heading">
      <h1 id="login-title" class="login-card__title">ENICarthage</h1>
      <p class="login-card__subtitle">Plateforme de Gestion des Incidents</p>
    </div>

    <div class="login-card__brand-row" aria-label="Branding ENICarthage">
      <img
        class="login-card__brand-logo"
        src="/logos/482089456_1117996793460432_4689510947938230990_n-removebg-preview.png"
        alt="Logo secondaire ENICarthage"
      />
      <span>Une expérience claire, fiable et moderne.</span>
    </div>

    <div *ngIf="errorMessage" class="login-card__alert" role="alert">
      {{ errorMessage }}
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <label class="login-field">
        <span class="login-field__label">Adresse Email</span>
        <span class="login-field__control">
          <span class="login-field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" [attr.fill]="'none'" [attr.stroke]="'currentColor'" [attr.stroke-width]="'1.8'" [attr.stroke-linecap]="'round'" [attr.stroke-linejoin]="'round'">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <path d="m3 7 9 6 9-6" />
            </svg>
          </span>
          <input
            type="email"
            formControlName="email"
            placeholder="exemple@enicarthage.tn"
            autocomplete="email"
            inputmode="email"
          />
        </span>
        <span *ngIf="(submitted || emailControl.touched) && emailControl.errors?.['required']" class="login-field__error">
          L’adresse email est requise.
        </span>
        <span *ngIf="(submitted || emailControl.touched) && emailControl.errors?.['email']" class="login-field__error">
          Veuillez saisir une adresse email valide.
        </span>
      </label>

      <label class="login-field">
        <span class="login-field__label">Mot de passe</span>
        <span class="login-field__control">
          <span class="login-field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" [attr.fill]="'none'" [attr.stroke]="'currentColor'" [attr.stroke-width]="'1.8'" [attr.stroke-linecap]="'round'" [attr.stroke-linejoin]="'round'">
              <rect x="4" y="11" width="16" height="10" rx="2" />
              <path d="M7 11V8a5 5 0 0 1 10 0v3" />
            </svg>
          </span>
          <input
            [type]="isPasswordVisible ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="login-field__toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="isPasswordVisible ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
            [attr.aria-pressed]="isPasswordVisible"
          >
            <svg *ngIf="!isPasswordVisible" viewBox="0 0 24 24" [attr.fill]="'none'" [attr.stroke]="'currentColor'" [attr.stroke-width]="'1.8'" [attr.stroke-linecap]="'round'" [attr.stroke-linejoin]="'round'">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="isPasswordVisible" viewBox="0 0 24 24" [attr.fill]="'none'" [attr.stroke]="'currentColor'" [attr.stroke-width]="'1.8'" [attr.stroke-linecap]="'round'" [attr.stroke-linejoin]="'round'">
              <path d="M3 3l18 18" />
              <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-1.2" />
              <path d="M6.5 6.5C4 8.3 2 12 2 12s3.5 6 10 6c1.7 0 3.2-.3 4.6-.8" />
              <path d="M14.9 5.2C14 5.1 13 5 12 5 5.5 5 2 12 2 12c.8 1.5 2 3.2 3.7 4.7" />
            </svg>
          </button>
        </span>
        <span *ngIf="(submitted || passwordControl.touched) && passwordControl.errors?.['required']" class="login-field__error">
          Le mot de passe est requis.
        </span>
        <span *ngIf="(submitted || passwordControl.touched) && passwordControl.errors?.['minlength']" class="login-field__error">
          Le mot de passe doit contenir au moins 6 caractères.
        </span>
      </label>

      <div class="login-form__meta">
        <a routerLink="/forgot-password" class="login-form__forgot">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="login-form__submit" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Se connecter</span>
        <span *ngIf="isSubmitting">Connexion...</span>
      </button>
    </form>

    <div class="login-card__divider"></div>

    <p class="login-card__footer">
      Comptes de test : admin&#64;enicarthage.tn | tech&#64;enicarthage.tn | user&#64;enicarthage.tn
    </p>

    <p class="login-card__link-row">
      Vous n'avez pas de compte ?
      <a routerLink="/register">Créer un compte</a>
    </p>
  </section>
</div>
