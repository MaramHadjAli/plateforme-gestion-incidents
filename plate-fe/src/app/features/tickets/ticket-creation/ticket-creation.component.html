<div class="min-h-screen bg-gray-50 flex items-center justify-center p-6 dark:bg-gray-900 transition-colors duration-300">
  <div class="max-w-3xl w-full bg-white dark:bg-gray-800 rounded-3xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-700 relative">
    
    <!-- Success Animation State -->
    <div *ngIf="successMode" @fadeSlideInOut class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/95 dark:bg-gray-800/95 backdrop-blur-md">
      <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-6 shadow-inner shadow-green-500/20">
        <svg class="w-12 h-12 text-green-600 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h2 class="text-3xl font-bold text-gray-800 dark:text-white mb-3">Ticket Submitted Successfully!</h2>
      <p class="text-gray-500 dark:text-gray-400 text-lg">Our SLA engine is tracking your request.</p>
    </div>

    <div class="p-10">
      <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 mb-8 pb-4 border-b border-gray-100 dark:border-gray-700">
        Create a Support Ticket
      </h2>
      
      <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="col-span-1 md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Title</label>
          <input type="text" formControlName="title" 
                 class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white outline-none transition-all"
                 placeholder="Brief description of the issue">
        </div>

        <div>
           <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Room / Location</label>
           <select formControlName="room" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white outline-none">
              <option value="">Select location</option>
              <option value="A101">Room A101</option>
              <option value="ServerRoom">Server Room</option>
           </select>
        </div>

        <div>
           <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Priority</label>
           <select formControlName="priority" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white outline-none">
              <option value="LOW">Low</option>
              <option value="NORMAL">Normal</option>
              <option value="HIGH">High</option>
              <option value="CRITICAL">Critical (SLA < 2H)</option>
           </select>
        </div>

        <div class="col-span-1 md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
            <textarea formControlName="description" rows="4" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white outline-none transition-all" placeholder="Provide details..."></textarea>
        </div>

        <!-- Drag & Drop Area -->
        <div class="col-span-1 md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Attachments (Screenshot/Image)</label>
            <div 
                [ngClass]="{'border-indigo-500 bg-indigo-50/50 dark:bg-indigo-900/20': isDragOver, 'border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700/50': !isDragOver}"
                class="border-2 border-dashed rounded-2xl p-8 text-center transition-all cursor-pointer relative"
                (click)="fileInput.click()">
                
                <input type="file" #fileInput (change)="onFileSelected($event)" class="hidden" accept="image/*">
                
                <div *ngIf="!uploadedImageUrl">
                    <svg class="mx-auto h-16 w-16 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-sm font-semibold text-gray-700 dark:text-gray-300">Click to upload or drag & drop</p>
                    <p class="text-xs text-gray-500 font-medium mt-1">PNG, JPG, GIF up to 5MB</p>
                </div>

                <div *ngIf="uploadedImageUrl" class="flex flex-col items-center">
                    <img [src]="uploadedImageUrl" class="max-h-32 rounded-lg shadow-sm border border-gray-200 dark:border-gray-600 mb-2">
                    <span class="text-sm text-green-600 dark:text-green-400 font-semibold flex items-center">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        File Attached Successfully
                    </span>
                </div>
            </div>
        </div>

        <button type="submit" [disabled]="isSubmitting || ticketForm.invalid"
                class="col-span-1 md:col-span-2 mt-4 flex justify-center items-center py-4 px-4 rounded-xl shadow-lg shadow-indigo-500/20 text-md font-bold text-white bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 disabled:opacity-50 disabled:shadow-none transition-all hover:scale-[1.01] active:scale-[0.99]">
          <span *ngIf="!isSubmitting">Submit Request</span>
          <svg *ngIf="isSubmitting" class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>
    </div>
  </div>
</div>
