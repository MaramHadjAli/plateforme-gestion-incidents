<div class="relative inline-block text-left">
  
  <!-- Bell Icon -->
  <button type="button" (click)="togglePanel()"
          class="relative p-2 text-gray-400 hover:text-gray-500 bg-white dark:bg-gray-800 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors shadow-sm cursor-pointer">
    <span class="sr-only">View notifications</span>
    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
    </svg>
    <!-- Badge -->
    <span *ngIf="unreadCount > 0" class="absolute top-0 right-0 block h-5 w-5 rounded-full bg-red-500 ring-2 ring-white dark:ring-gray-800 text-white text-xs font-bold flex items-center justify-center translate-x-1 -translate-y-1 animate-pulse">
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>
  </button>

  <!-- Dropdown Panel -->
  <div *ngIf="isOpen" @dropdownFade
       class="origin-top-right absolute right-0 mt-2 w-80 sm:w-96 rounded-2xl shadow-2xl bg-white dark:bg-gray-800 ring-1 ring-black ring-opacity-5 focus:outline-none z-50 overflow-hidden border border-gray-100 dark:border-gray-700">
    <div class="bg-gray-50 dark:bg-gray-900 px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
      <h3 class="text-sm font-bold text-gray-900 dark:text-gray-100">Notifications</h3>
      <button *ngIf="unreadCount > 0" (click)="markAllRead()" class="text-xs text-indigo-600 dark:text-indigo-400 hover:text-indigo-500 font-semibold transition-colors">
        Mark all read
      </button>
    </div>
    
    <div class="max-h-80 overflow-y-auto">
      <div *ngIf="notifications.length === 0" class="p-6 text-center text-sm text-gray-500 dark:text-gray-400">
        You're all caught up!
      </div>
      
      <ul class="divide-y divide-gray-100 dark:divide-gray-700">
        <li *ngFor="let notif of notifications" 
            [ngClass]="{'bg-indigo-50/50 dark:bg-indigo-900/10': !notif.read}"
            class="p-4 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors cursor-pointer flex relative">
          
          <div *ngIf="!notif.read" class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500"></div>

          <div class="flex-shrink-0 mr-3 mt-1">
            <span class="inline-flex items-center justify-center p-2 bg-red-100 dark:bg-red-900/30 rounded-full text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </span>
          </div>
          <div>
            <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">{{ notif.title }}</p>
            <p class="text-sm text-gray-600 dark:text-gray-400 mt-0.5 line-clamp-2">{{ notif.message }}</p>
            <p class="text-xs text-gray-500 mt-1 flex items-center">
              <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              {{ notif.timestamp | date:'shortTime' }}
            </p>
          </div>
        </li>
      </ul>
    </div>
    
  </div>
</div>
