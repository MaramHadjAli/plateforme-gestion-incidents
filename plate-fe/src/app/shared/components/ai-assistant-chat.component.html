<div class="ai-assistant-container">
    <!-- Chat Toggle Button -->
    <button class="chat-button" (click)="toggleChat()">
        <i class="fas" [class.fa-robot]="!isOpen" [class.fa-times]="isOpen"></i>
    </button>

    <!-- Chat Window -->
    <div class="chat-window" *ngIf="isOpen">
        <div class="chat-header">
            <div class="header-info">
                <div class="bot-avatar">
                    <i class="fas fa-magic"></i>
                </div>
                <div class="header-text">
                    <h3>Assistant Gemini</h3>
                    <span>Maintenance Préventive</span>
                </div>
            </div>
            <button class="close-btn" (click)="toggleChat()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="chat-messages" #scrollContainer>
            <div *ngFor="let msg of messages" class="message" [ngClass]="msg.type">
                {{ msg.text }}
            </div>
            
            <div *ngIf="isTyping" class="message bot">
                <div class="typing-indicator">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                placeholder="Posez une question sur la maintenance..." 
                [(ngModel)]="userInput"
                (keyup.enter)="sendMessage()"
            >
            <button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
