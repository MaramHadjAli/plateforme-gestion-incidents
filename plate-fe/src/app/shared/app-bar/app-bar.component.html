<nav class="glass border-b border-white/[0.06] sticky top-0 z-50">
  <div class="max-w-screen-xl mx-auto px-4 sm:px-6">
    <div class="flex items-center justify-between h-16 gap-4">

      <div class="flex items-center gap-3 shrink-0">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center shadow-lg shadow-sky-500/20">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 7a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
          </svg>
        </div>
        <div>
          <span class="brand-font text-white text-[15px] font-bold tracking-tight leading-none block">PIM</span>
          <span class="text-gray-500 text-[9px] uppercase tracking-widest leading-none">ENICarthage</span>
        </div>
      </div>

      <nav class="hidden lg:flex items-center gap-1">
        <a
          *ngFor="let link of navLinks"
          [routerLink]="link.route"
          routerLinkActive="active text-white bg-white/[0.07]"
          [class]="'nav-pill flex items-center gap-2 px-3 py-2 rounded-lg text-[13px] font-medium transition-all duration-200 text-gray-400 hover:text-gray-200 hover:bg-white/[0.04]'"
        >
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="link.icon" />
          </svg>
          {{ link.label }}
        </a>
      </nav>

      <div class="flex items-center gap-2 ml-auto">

        <div class="relative" data-search>
          <div *ngIf="searchOpen" class="flex items-center">
            <div class="relative">
              <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              <input
                #searchInput
                type="text"
                [(ngModel)]="searchQuery"
                placeholder="Rechercher tickets, salles..."
                class="bg-gray-900 border border-white/10 text-gray-200 placeholder-gray-500 text-sm rounded-lg pl-9 pr-4 py-2 w-60 focus:outline-none focus:border-sky-500/60 focus:ring-1 focus:ring-sky-500/30 transition-all"
              />
              <div *ngIf="searchSuggestions.length > 0" class="absolute top-full mt-2 left-0 w-full bg-gray-900 border border-white/10 rounded-xl shadow-2xl overflow-hidden z-50">
                <button type="button"
                  *ngFor="let s of searchSuggestions"
                  class="w-full text-left px-4 py-2.5 text-sm text-gray-300 hover:bg-white/[0.05] hover:text-white transition-colors flex items-center gap-2"
                >
                  <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
                  {{ s }}
                </button>
              </div>
            </div>
            <button type="button" (click)="closeSearch()" class="ml-2 text-gray-500 hover:text-gray-300 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
              <span class="sr-only">Fermer la recherche</span>
            </button>
          </div>
          <button type="button" *ngIf="!searchOpen" (click)="searchOpen = true" class="p-2 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-white/[0.06] transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <span class="sr-only">Ouvrir la recherche</span>
          </button>
        </div>

        <div class="relative" data-notif>
          <button type="button"
            (click)="toggleNotif()"
            class="relative p-2 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-white/[0.06] transition-all"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <span *ngIf="unreadCount > 0" class="absolute top-1.5 right-1.5 flex">
              <span class="pulse-ring absolute inline-flex w-3 h-3 rounded-full bg-sky-400 opacity-60"></span>
              <span class="relative inline-flex rounded-full w-3 h-3 bg-sky-400 items-center justify-center text-[8px] font-bold text-gray-900">{{ unreadCount }}</span>
            </span>
          </button>

          <div *ngIf="notifOpen" class="absolute right-0 mt-2 w-80 bg-gray-900 border border-white/[0.08] rounded-2xl shadow-2xl shadow-black/40 overflow-hidden z-50">
            <div class="flex items-center justify-between px-4 py-3 border-b border-white/[0.06]">
              <span class="text-sm font-semibold text-white">Notifications</span>
              <button type="button" *ngIf="unreadCount > 0" (click)="markAllRead()" class="text-xs text-sky-400 hover:text-sky-300 transition-colors">
                Tout marquer lu
              </button>
            </div>
            <div class="notif-scroll overflow-y-auto max-h-72">
              <button type="button"
                *ngFor="let n of notifications"
                (click)="markRead(n.id)"
                [class]="'w-full flex items-start gap-3 px-4 py-3 hover:bg-white/[0.04] transition-colors text-left ' + (n.unread ? 'bg-white/[0.02]' : '')"
              >
                <div [class]="'w-2 h-2 rounded-full mt-1.5 shrink-0 ' + typeColors[n.type]"></div>
                <div class="flex-1 min-w-0">
                  <p [class]="'text-xs leading-snug ' + (n.unread ? 'text-gray-200' : 'text-gray-400')">{{ n.message }}</p>
                  <p class="text-[11px] text-gray-500 mt-1">{{ n.time }}</p>
                </div>
                <div *ngIf="n.unread" class="w-1.5 h-1.5 rounded-full bg-sky-400 mt-2 shrink-0"></div>
              </button>
            </div>
            <div class="px-4 py-2.5 border-t border-white/[0.06]">
              <button type="button" class="w-full text-center text-xs text-gray-500 hover:text-gray-300 transition-colors py-1">
                Voir toutes les notifications
              </button>
            </div>
          </div>
        </div>

        <div class="relative" data-profile>
          <button type="button"
            (click)="toggleProfile()"
            class="flex items-center gap-2.5 pl-1 pr-2 py-1 rounded-xl hover:bg-white/[0.06] transition-all group"
          >
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xs font-semibold shadow-md shadow-indigo-500/20 shrink-0">
              {{ userInitials }}
            </div>
            <div class="hidden sm:block text-left">
              <p class="text-[13px] font-medium text-gray-200 leading-none">{{ userName }}</p>
              <p [class]="'pt-3 text-[10px] mt-0.5 font-medium border rounded px-1 py-px w-fit leading-none ' + roleColors[userRole]">{{ userRole }}</p>
            </div>
            <svg [class]="'w-3.5 h-3.5 text-gray-500 hidden sm:block transition-transform duration-200 ' + (profileOpen ? 'rotate-180' : '')" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <div *ngIf="profileOpen" class="absolute right-0 mt-2 w-56 bg-gray-900 border border-white/[0.08] rounded-2xl shadow-2xl shadow-black/40 overflow-hidden z-50">
            <div class="px-4 py-3 border-b border-white/[0.06]">
              <p class="text-sm font-semibold text-white">{{ userName }}</p>
              <p class="text-xs text-gray-400 mt-0.5 truncate">{{ userEmail }}</p>
              <div class="mt-2 flex items-center gap-1.5">
                <div class="h-1.5 flex-1 bg-gray-800 rounded-full overflow-hidden">
                  <div class="h-full bg-gradient-to-r from-sky-500 to-indigo-500 rounded-full" [style.width.%]="pointsPercent"></div>
                </div>
                <span class="text-[10px] text-gray-400">{{ userPoints }} pts</span>
              </div>
            </div>
            <a
              *ngFor="let item of profileMenuItems"
              [routerLink]="item.route"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 hover:text-white hover:bg-white/[0.05] transition-colors cursor-pointer"
            >
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="item.icon" />
              </svg>
              {{ item.label }}
            </a>
            <div class="border-t border-white/[0.06] mt-1">
              <button type="button" (click)="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-400 hover:text-red-300 hover:bg-red-400/[0.06] transition-colors">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Déconnexion
              </button>
            </div>
          </div>
        </div>

        <button
          type="button"
          (click)="mobileOpen = !mobileOpen"
          title="Ouvrir le menu"
          aria-label="Ouvrir le menu"
          class="lg:hidden p-2 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-white/[0.06] transition-all"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="mobileOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'" />
          </svg>
          <span class="sr-only">Ouvrir la navigation mobile</span>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="mobileOpen" class="lg:hidden border-t border-white/[0.06] px-4 pb-4 pt-2 space-y-1">
    <a
      *ngFor="let link of navLinks"
      [routerLink]="link.route"
      routerLinkActive="text-white bg-white/[0.08]"
      (click)="mobileOpen = false"
      [class]="'w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all text-gray-400 hover:text-white hover:bg-white/[0.04]'"
    >
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="link.icon" />
      </svg>
      {{ link.label }}
    </a>
  </div>
</nav>
