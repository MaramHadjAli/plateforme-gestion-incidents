<nav class="app-navbar">
  <div class="app-navbar__inner">
    <a class="app-brand" routerLink="/home" aria-label="ENICarthage - accueil">
      <img
        class="app-brand__logo"
        src="/logos/475423667_1092274072699371_3696065154213442200_n-removebg-preview.png"
        alt="Logo ENICarthage"
      />
      <div class="app-brand__text">
        <span class="app-brand__name">ENICarthage</span>
        <span class="app-brand__tag">Plateforme de gestion des incidents</span>
      </div>
    </a>

    <nav class="app-navbar__links hidden lg:flex">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.route"
        routerLinkActive="is-active"
        class="app-navlink"
      >
        {{ link.label }}
      </a>
    </nav>

    <div class="app-navbar__actions">
      <div class="relative" data-search>
        <div *ngIf="searchOpen" class="app-search">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            placeholder="Rechercher tickets, salles..."
            class="app-search__input"
          />
          <div *ngIf="searchSuggestions.length > 0" class="app-search__suggestions">
            <button
              type="button"
              *ngFor="let s of searchSuggestions"
              class="app-search__suggestion"
            >
              {{ s }}
            </button>
          </div>
          <button type="button" (click)="closeSearch()" class="app-icon-btn" aria-label="Fermer la recherche">×</button>
        </div>
        <button type="button" *ngIf="!searchOpen" (click)="searchOpen = true" class="app-icon-btn" aria-label="Ouvrir la recherche">⌕</button>
      </div>

      <div class="relative" data-notif>
        <button type="button" (click)="toggleNotif()" class="app-icon-btn" aria-label="Notifications">
          🔔
          <span *ngIf="unreadCount > 0" class="app-badge">{{ unreadCount }}</span>
        </button>
        <div *ngIf="notifOpen" class="app-dropdown app-dropdown--notif">
          <div class="app-dropdown__header">
            <span>Notifications</span>
            <button type="button" *ngIf="unreadCount > 0" (click)="markAllRead()">Tout marquer lu</button>
          </div>
          <div class="notif-scroll app-dropdown__list">
            <button
              type="button"
              *ngFor="let n of notifications"
              (click)="markRead(n.id)"
              class="app-dropdown__item"
            >
              <span [class]="'app-dot ' + typeColors[n.type]"></span>
              <span class="app-dropdown__content">
                <span [class]="n.unread ? 'is-unread' : ''">{{ n.message }}</span>
                <small>{{ n.time }}</small>
              </span>
            </button>
          </div>
        </div>
      </div>

      <div class="relative" data-profile>
        <button type="button" (click)="toggleProfile()" class="app-profile-btn" aria-label="Profil utilisateur">
          <span class="app-avatar">{{ userInitials }}</span>
          <span class="hidden sm:flex app-profile-btn__meta">
            <strong>{{ userName }}</strong>
            <small>{{ userRole }}</small>
          </span>
        </button>
        <div *ngIf="profileOpen" class="app-dropdown app-dropdown--profile">
          <div class="app-dropdown__header app-dropdown__header--profile">
            <div>
              <strong>{{ userName }}</strong>
              <small>{{ userEmail }}</small>
            </div>
          </div>
          <a *ngFor="let item of profileMenuItems" [routerLink]="item.route" class="app-dropdown__item app-dropdown__item--link">
            {{ item.label }}
          </a>
          <button type="button" (click)="logout()" class="app-dropdown__item app-dropdown__item--danger">Déconnexion</button>
        </div>
      </div>

      <button
        type="button"
        (click)="mobileOpen = !mobileOpen"
        class="lg:hidden app-icon-btn"
        aria-label="Ouvrir le menu"
      >
        ☰
      </button>
    </div>
  </div>

  <div *ngIf="mobileOpen" class="lg:hidden app-mobile">
    <a *ngFor="let link of navLinks" [routerLink]="link.route" (click)="mobileOpen = false" class="app-mobile__link">{{ link.label }}</a>
  </div>
</nav>
