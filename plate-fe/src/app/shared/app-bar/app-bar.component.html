<nav class="app-navbar">
  <div class="app-navbar__inner">
    <a class="app-brand" routerLink="/home" aria-label="ENICarthage - accueil">
      <img
        class="app-brand__logo"
        src="/logos/475423667_1092274072699371_3696065154213442200_n-removebg-preview.png"
        alt="Logo ENICarthage"
      />
      <div class="app-brand__text">
        <span class="app-brand__name">ENICarthage</span>
        <span class="app-brand__tag">Plateforme de gestion des incidents</span>
      </div>
    </a>

    <nav class="app-navbar__links hidden lg:flex">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.route"
        routerLinkActive="is-active"
        class="app-navlink"
      >
        <span class="app-navlink__icon">{{ link.icon }}</span>
        <span>{{ link.label }}</span>
      </a>
    </nav>

    <div class="app-navbar__actions">
      <div class="relative" data-search>
        <div *ngIf="searchOpen" class="app-search">
          <svg class="app-search__icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <input
            type="text"
            [(ngModel)]="searchQuery"
            placeholder="Rechercher tickets, salles..."
            class="app-search__input"
            (input)="onSearchInput($event)"
          />
          <div *ngIf="searchSuggestions.length > 0" class="app-search__suggestions">
            <button
              type="button"
              *ngFor="let s of searchSuggestions"
              class="app-search__suggestion"
              (click)="selectSuggestion(s)"
            >
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
              {{ s }}
            </button>
          </div>
          <button type="button" (click)="closeSearch()" class="app-icon-btn app-icon-btn--sm" aria-label="Fermer la recherche">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <button type="button" *ngIf="!searchOpen" (click)="searchOpen = true" class="app-icon-btn" aria-label="Ouvrir la recherche">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </button>
      </div>

      <div class="relative" data-notif>
        <button type="button" (click)="toggleNotif()" class="app-icon-btn" aria-label="Notifications">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
          <span *ngIf="unreadCount > 0" class="app-badge">{{ unreadCount }}</span>
        </button>
        <div *ngIf="notifOpen" class="app-dropdown app-dropdown--notif">
          <div class="app-dropdown__header">
            <span>Notifications</span>
            <button type="button" *ngIf="unreadCount > 0" (click)="markAllRead()" class="app-dropdown__action">Tout marquer lu</button>
          </div>
          <div class="notif-scroll app-dropdown__list">
            <button
              type="button"
              *ngFor="let n of notifications; trackBy: trackNotification"
              (click)="openNotification(n)"
              class="app-dropdown__item notif-item"
              [class.is-unread]="n.unread"
            >
              <span [class]="'app-dot ' + typeColors[n.type]"></span>
              <span class="notif-icon">{{ typeIcons[n.type] }}</span>
              <span class="app-dropdown__content">
                <span class="notif-title">{{ n.title }}</span>
                <span class="notif-message" [class.is-unread]="n.unread">{{ n.message }}</span>
                <span class="notif-meta">
                  <small>{{ n.time }}</small>
                  <span *ngIf="n.ticketId" class="notif-pill">#{{ n.ticketId }}</span>
                </span>
              </span>
              <span class="notif-action">
                Voir
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
              </span>
            </button>
          </div>
        </div>
      </div>

      <div class="relative" data-profile>
        <button type="button" (click)="toggleProfile()" class="app-profile-btn" aria-label="Profil utilisateur">
          <span class="app-avatar">{{ userInitials }}</span>
          <span class="hidden sm:flex app-profile-btn__meta">
            <strong>{{ userName }}</strong>
            <small>{{ userRole }}</small>
          </span>
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="app-profile-btn__chevron">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
        <div *ngIf="profileOpen" class="app-dropdown app-dropdown--profile">
          <div class="app-dropdown__header app-dropdown__header--profile">
            <div class="app-profile-info">
              <span class="app-avatar app-avatar--lg">{{ userInitials }}</span>
              <div>
                <strong>{{ userName }}</strong>
                <small>{{ userEmail }}</small>
              </div>
            </div>
          </div>
          <div class="app-dropdown__divider"></div>
          <a *ngFor="let item of profileMenuItems" [routerLink]="item.route" class="app-dropdown__item app-dropdown__item--link">
            <span class="app-dropdown__item-icon">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>
          <div class="app-dropdown__divider"></div>
          <button type="button" (click)="logout()" class="app-dropdown__item app-dropdown__item--danger">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            Déconnexion
          </button>
        </div>
      </div>

      <button
        type="button"
        (click)="mobileOpen = !mobileOpen"
        class="lg:hidden app-icon-btn"
        aria-label="Ouvrir le menu"
      >
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>
  </div>

  <div *ngIf="mobileOpen" class="lg:hidden app-mobile">
    <div class="app-mobile__header">
      <span class="app-mobile__title">Menu</span>
      <button type="button" (click)="mobileOpen = false" class="app-icon-btn app-icon-btn--sm">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <a *ngFor="let link of navLinks" [routerLink]="link.route" (click)="mobileOpen = false" class="app-mobile__link">
      <span class="app-mobile__link-icon">{{ link.icon }}</span>
      <span>{{ link.label }}</span>
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
      </svg>
    </a>
  </div>
</nav>
