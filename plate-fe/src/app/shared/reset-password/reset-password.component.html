<div class="reset-password-container">
  <div class="reset-card">
    <div class="reset-header">
      <h2>Réinitialisation du mot de passe</h2>
      <p>Entrez votre nouveau mot de passe</p>
    </div>

    <div *ngIf="loading" class="loading-message">
      <p>Vérification du lien...</p>
    </div>
    
    <div *ngIf="!loading && isValidToken" class="reset-form">
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" [(ngModel)]="newPassword" placeholder="********" class="form-control">
      </div>
      
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" [(ngModel)]="confirmPassword" placeholder="********" class="form-control">
      </div>
      
      <button (click)="resetPassword()" class="btn-reset" [disabled]="!isPasswordValid()">
        Réinitialiser
      </button>
    </div>
    
    <div *ngIf="!loading && !isValidToken" class="error-message">
      <p>Lien invalide ou expiré</p>
      <a routerLink="/forgot-password">Demander un nouveau lien</a>
    </div>
    
    <div *ngIf="success" class="success-message">
      <p>Mot de passe réinitialisé avec succès !</p>
      <a routerLink="/login">Se connecter</a>
    </div>
  </div>
</div>
