spring.application.name=plate-be

spring.datasource.url=jdbc:mysql://localhost:3306/plate-incendie-db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=noreply@plate-incidents.com

# JWT Configuration
app.jwt.secret=SECRETKEYSECRETKEYSECRETKEYSECRETKEYSECRETKEY
# 24 hours
app.jwt.expirationMs=86400000
# 7 days
app.jwt.refreshTokenExpirationMs=604800000

# ===== HTTPS Configuration =====
# Dťcommenter les lignes suivantes pour activer HTTPS en production
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=your-keystore-password
# server.ssl.key-store-type=PKCS12
# server.port=8443

# ===== HTTPS Redirection (HTTP -> HTTPS) =====
# Dťcommenter pour rediriger HTTP vers HTTPS
# server.http2.enabled=true
# server.servlet.session.cookie.secure=true
# server.servlet.session.cookie.http-only=true
# server.servlet.session.cookie.same-site=strict

# ===== Security Headers =====
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ===== Compression =====
server.compression.enabled=true
server.compression.min-response-size=1024


